# Schema matching SwiftOCA's Examples/OCADevice:
#   Block (ONo 10000)
#     BooleanActuator x8 (ONos 10010..10017) — 4x2 matrix
#     Gain (ONo 10020)
device:
  name: OCADevice

  profiles:
    - com.padl.OCADevice:
      - Block:
          classID: 1.1.3
          match: 0x00002710/0x00000000
          objectNumber: 0x00001000/0x000000F0
          actionObjects:
            - "Actuator(0,0)":
                classID: 1.1.1.1.1
                match: 0x0000271A/0x00000000
                objectNumber: 0x00002000/0x000000F0
            - "Actuator(0,1)":
